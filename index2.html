<!--
  <p>イベント名: <span id="event"></span></p>
  <p>開催日: <span id="day"></span></p>
  <p>開場: <span id="open"></span></p>
  <p>開演: <span id="start"></span></p>
  <p>券種: <span id="type"></span></p>
  <p>種別: <span id="ref"></span></p>
  <p>金額: <span id="price"></span></p>
-->

  <script>
    // URLパラメータから "e" パラメータを取得
    function getQueryParam(name) {
      const urlParams = new URLSearchParams(window.location.search);
      return urlParams.get(name);
    }

    // CSVを読み込み、"e" パラメータに基づきイベント名をHTMLに反映する
    function loadCSVAndPopulateEvent() {
      const eParam = getQueryParam('e'); // "e" パラメータを取得

      if (eParam) {
        fetch('data.csv') // CSVファイルを読み込む
          .then(response => response.text())
          .then(csvData => {
            const rows = csvData.split('\n');
            const headers = rows[0].split(',');

            // 各行のデータを検索
            for (let i = 1; i < rows.length; i++) {
              const cols = rows[i].split(',');
              if (cols[0] === eParam) { // "e" パラメータと一致する行を探す
                const data = {
                  event: cols[1],   // イベント名
                  day: cols[2],     // 開催日
                  open: cols[3],    // 開場
                  start: cols[4],   // 開演
                  type: cols[5],    // 券種
                  ref: cols[6],     // 種別
                  price: parseInt(cols[7], 10).toLocaleString(), // 金額を数値に変換し、カンマ区切りにフォーマット
                };
                document.getElementById('event').textContent = data.event;
                document.getElementById('day').textContent = data.day;
                document.getElementById('open').textContent = data.open;
                document.getElementById('start').textContent = data.start;
                document.getElementById('type').textContent = data.type;
                document.getElementById('ref').textContent = data.ref;
                document.getElementById('price').textContent = data.price;
                break;
              }
            }
          })
          .catch(error => console.error('CSVの読み込みに失敗しました:', error));
      }
    }

    // ページがロードされたらCSVを読み込んでイベント情報を表示
    window.onload = loadCSVAndPopulateEvent;
  </script>

  <script>
function openURL() {
  const baseUrl = "./l_1.html";
  const fixedEventId = "5"; // ← 固定

  const inputText = document.getElementById("inputText").value;
  const encodedText = encodeURIComponent(inputText);

  let fullUrl = `${baseUrl}?n=${encodedText}&e=${fixedEventId}`;
  window.open(fullUrl, '_blank');
}
</script>
