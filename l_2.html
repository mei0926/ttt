    <script>
        function getActivePage() {
        return document.querySelector('.page.active');
        }
        // URLパラメータから指定されたクエリパラメータを取得
        function getQueryParam(name) {
            const urlParams = new URLSearchParams(window.location.search);
            return urlParams.get(name);
        }
        // CSVを読み込み、"e" パラメータに基づきイベント名をHTMLに反映する
        function loadCSVAndPopulateEvent() {
            const eParam = getQueryParam('e'); // "e" パラメータを取得

            if (eParam) {
                fetch('data.csv') // CSVファイルを読み込む
                    .then(response => response.text())
                    .then(csvData => {
                        const rows = csvData.split('\n');
                        const headers = rows[0].split(',');

                        // 各行のデータを検索
                        for (let i = 1; i < rows.length; i++) {
                            const cols = rows[i].split(',');
                            if (cols[0] === eParam) { // "e" パラメータと一致する行を探す
                                const data = {
                                    event: cols[1],   // イベント名
                                    day: cols[2],     // 開催日
                                    open: cols[3],    // 開場
                                    start: cols[4],   // 開演
                                    type: cols[5],    // 券種
                                    ref: cols[6],     // 種別
                                    price: parseInt(cols[7], 10).toLocaleString(), // 金額を数値に変換し、カンマ区切りにフォーマット
                                };
                                const page = getActivePage();

                                page.querySelector('#event').textContent = data.event;
                                page.querySelector('#day').textContent = data.day;
                                page.querySelector('#open').textContent = data.open;
                                page.querySelector('#start').textContent = data.start;
                                // 任意改行マーカーを <br> にする
                                const typeHtml = data.type.replace(/\|\|/g, '<br>');
                                page.querySelector('#type').innerHTML = typeHtml;
                                page.querySelector('#ref').textContent = data.ref;
                                page.querySelector('#price').textContent = data.price;



                                // refがnullまたは空文字列なら、seibanクラスを持つ要素を非表示にする
                                if (!data.ref) {
                                    const page = getActivePage();
                                    const seibanElements = page.getElementsByClassName('#seiban');
                                    for (let j = 0; j < seibanElements.length; j++) {
                                        seibanElements[j].style.display = 'none';
                                    }
                                }
                                break;
                            }
                        }
                    })
                    .catch(error => console.error('CSVの読み込みに失敗しました:', error));
            }
        }

        // 整理番号を設定する関数
        function setNumber() {
            const nParam = getQueryParam('n'); // "n" パラメータを取得
            if (nParam) { // nParamがnullでないか確認
                const page = getActivePage();
                page.querySelector("#number").innerText = nParam;
                setNameFromNumber(nParam); // ここで取得したnParamを使って名前を設定
            }
        }

    // "number" の値を元に名前を設定
function setNameFromNumber(key) {
    const data = {
        "Ｂ列7番": "松本　遼以",
        "Ｃ列13番": "渡邉　恭平",
        "Ｃ列10番": "吉井　勇人",
        "Ｃ列14番": "久遠　律",
        "Ａ列13番": "横山　武蔵",
        "Ｂ列22番": "小形　恒一"
    };

    const name = data[key] || "該当なし";

    document.querySelectorAll("#tname").forEach(el => {
        el.textContent = name;
    });
}



               // ページを開いた時刻をフォーマットして表示
function setCurrentTime() {
  const page = getActivePage();
  if (!page) return;

  const timeEl = page.querySelector('#time');
  if (!timeEl) return;   // ← これ超重要

  const now = new Date();
  const formattedTime =
    `${now.getFullYear()}/${String(now.getMonth() + 1).padStart(2, '0')}/${String(now.getDate()).padStart(2, '0')} ` +
    `${String(now.getHours()).padStart(2, '0')}:${String(now.getMinutes()).padStart(2, '0')}:${String(now.getSeconds()).padStart(2, '0')}`;

  timeEl.textContent = formattedTime;
}



        // ページがロードされたら関数を実行
window.addEventListener('DOMContentLoaded', () => {
  eParam = getQueryParam('e');
  nParam = getQueryParam('n');

  loadCSVAndPopulateEvent();
  setNumber();
  setCurrentTime();
  initSwipe();   // ← スワイプ初期化を関数化
});

    </script>

    <script>
        let startX = 0; // タッチ開始位置（X軸）
        let startY = 0; // タッチ開始位置（Y軸）
        let currentX = 0; // 現在のタッチ位置（X軸）
        let deltaX = 0; // X軸の移動量
        let deltaY = 0; // Y軸の移動量
        let isSwiping = false; // スワイプ中かどうかのフラグ
        const threshold = 50; // スワイプの有効しきい値
        let eParam = null;
        let nParam = null;


        function initSwipe() {

            const swipeElement = document.querySelector('#swipe img'); // スワイプ対象の要素

            if (!swipeElement) {
                console.error('スワイプ対象の要素が見つかりません');
                return;
            }
            // スワイプ中に要素を表示
            function showSwipe() {
                swipeElement.style.opacity = '1';
            }

            // スワイプが終了したら非表示にする
            function hideSwipe() {
                swipeElement.style.opacity = '0';
            }

            // ページ全体のタッチイベントを制御
            document.addEventListener('touchstart', function (event) {
                if (event.touches.length > 1) {
                    event.preventDefault(); // 2本指以上の場合は無効化
                }
            }, { passive: false });

            document.addEventListener('touchmove', function (event) {
                if (event.touches.length > 1) {
                    event.preventDefault(); // 2本指以上の場合は無効化
                }
            }, { passive: false });

            // タッチ開始時の処理
            swipeElement.addEventListener('touchstart', (event) => {
                if (event.touches.length === 2) { // 複数タッチを無視
                    isSwiping = true;
                    startX = event.touches[0].clientX; // X軸のタッチ開始位置を記録
                    startY = event.touches[0].clientY; // Y軸のタッチ開始位置を記録
                    swipeElement.style.transition = 'none'; // アニメーションを無効化
                    showSwipe(); // タッチ開始時に要素を表示

                }
            });

            // タッチ移動中の処理
            swipeElement.addEventListener('touchmove', (event) => {
                if (!isSwiping) return;

                currentX = event.touches[0].clientX; // 現在のX軸のタッチ位置
                const currentY = event.touches[0].clientY; // 現在のY軸のタッチ位置
                deltaX = currentX - startX; // X軸の移動量を計算
                deltaY = currentY - startY; // Y軸の移動量を計算

                // 縦方向の移動が多い場合は無視（横方向限定）
                if (Math.abs(deltaY) > Math.abs(deltaX)) {
                    isSwiping = false; // 縦方向にスワイプされた場合は動作をキャンセル
                    return;
                }

                swipeElement.style.transform = `translateX(${deltaX}px)`; // 横方向に要素を移動
            });

            // タッチ終了時の処理
  swipeElement.addEventListener('touchend', () => {
    if (!isSwiping) return;

    isSwiping = false;
    swipeElement.style.transition = 'transform 0.2s ease';

    // スワイプ成功判定
    if (Math.abs(deltaX) > threshold && nParam) {

        // スワイプUIを先に消す
        swipeElement.style.opacity = '0';

        // 少し待ってから画面切り替え
        setTimeout(() => {
            goToL3();
        }, 150);

        return;
    }

    // 失敗時は元に戻す
    swipeElement.style.transform = 'translateX(0)';
});


            // タッチキャンセル時の処理
            swipeElement.addEventListener('touchcancel', () => {
                if (isSwiping) {
                    isSwiping = false;
                    swipeElement.style.transition = 'transform 0.3s ease';
                    swipeElement.style.transform = 'translateX(0)';
                }
            });
            // パラメータを取得
            eParam = getQueryParam('e');  // "e" パラメータを取得
            nParam = getQueryParam('n');  // "n" パラメータを取得

            loadCSVAndPopulateEvent();  // イベント情報を表示
            setNumber();  // 整理番号を設定

            // L2 → L1 遷移用リンクを設定（L2専用）
            const nextBtn = document.querySelector('#page-l2 #nextBtnLink');
            if (nextBtn && eParam && nParam) {
                nextBtn.href = "./l_1.html?e=" + eParam + "&n=" + nParam;
            }


        };

function goToL3() {
  const l2 = document.getElementById('page-l2');
  const l3 = document.getElementById('page-l3');

  l2.classList.remove('active');
  l3.classList.add('active');

  // ★ L3が active になってから実行
  loadCSVAndPopulateEvent();
  setNumber();
  setCurrentTime();   // ← これが抜けてる or タイミング不正

  history.replaceState(null, '', `?e=${eParam}&n=${nParam}`);
}


    </script>
