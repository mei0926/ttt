<!DOCTYPE html>
<html lang="ja">

<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0"/>
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;600&display=swap" rel="stylesheet"/>
<meta name="robots" content="noindex, nofollow">
<link rel="manifest" href="./manifest.json">
    <script>
        // URLパラメータから指定されたクエリパラメータを取得
        function getQueryParam(name) {
            const urlParams = new URLSearchParams(window.location.search);
            return urlParams.get(name);
        }
        // CSVを読み込み、"e" パラメータに基づきイベント名をHTMLに反映する
        function loadCSVAndPopulateEvent() {
            const eParam = getQueryParam('e'); // "e" パラメータを取得

            if (eParam) {
                fetch('data.csv') // CSVファイルを読み込む
                    .then(response => response.text())
                    .then(csvData => {
                        const rows = csvData.split('\n');
                        const headers = rows[0].split(',');

                        // 各行のデータを検索
                        for (let i = 1; i < rows.length; i++) {
                            const cols = rows[i].split(',');
                            if (cols[0] === eParam) { // "e" パラメータと一致する行を探す
                                const data = {
                                    event: cols[1],   // イベント名
                                    day: cols[2],     // 開催日
                                    open: cols[3],    // 開場
                                    start: cols[4],   // 開演
                                    type: cols[5],    // 券種
                                    ref: cols[6],     // 種別
                                    price: parseInt(cols[7], 10).toLocaleString(), // 金額を数値に変換し、カンマ区切りにフォーマット
                                };
                                document.getElementById('event').textContent = data.event;
                                document.getElementById('day').textContent = data.day;
                                document.getElementById('open').textContent = data.open;
                                document.getElementById('start').textContent = data.start;
                                // 任意改行マーカーを <br> にする
                                const typeHtml = data.type.replace(/\|\|/g, '<br>');
                                document.getElementById('type').innerHTML = typeHtml;
                                document.getElementById('ref').textContent = data.ref;
                                document.getElementById('price').textContent = data.price;



                                // refがnullまたは空文字列なら、seibanクラスを持つ要素を非表示にする
                                if (!data.ref) {
                                    const seibanElements = document.getElementsByClassName('seiban');
                                    for (let j = 0; j < seibanElements.length; j++) {
                                        seibanElements[j].style.display = 'none';
                                    }
                                }
                                break;
                            }
                        }
                    })
                    .catch(error => console.error('CSVの読み込みに失敗しました:', error));
            }
        }

        // 整理番号を設定する関数
        function setNumber() {
            const nParam = getQueryParam('n'); // "n" パラメータを取得
            if (nParam) { // nParamがnullでないか確認
                document.getElementById("number").innerText = nParam;
                setNameFromNumber(nParam); // ここで取得したnParamを使って名前を設定
            }
        }

    // "number" の値を元に名前を設定
function setNameFromNumber(key) {
    const data = {
"Ｂ列7番": "松本　遼以",
"Ｃ列13番": "渡邉　恭平",
"Ｃ列10番": "吉井　勇人",
"Ｃ列14番": "久遠　律",
"Ａ列13番": "横山　武蔵",
"Ｂ列22番": "小形　恒一"
    };

    document.getElementById("tname").textContent =
        data[key] || "該当なし";
}

        // ページを開いた時刻をフォーマットして表示
        function setCurrentTime() {
            const now = new Date(); // 現在日時を取得
            const formattedTime = `${now.getFullYear()}/${String(now.getMonth() + 1).padStart(2, '0')}/${String(now.getDate()).padStart(2, '0')} ` +
                `${String(now.getHours()).padStart(2, '0')}:${String(now.getMinutes()).padStart(2, '0')}:${String(now.getSeconds()).padStart(2, '0')}`;
            document.getElementById("time").innerText = formattedTime; // "time" IDの要素に時刻を設定
        }

        // ページがロードされたら関数を実行
        window.onload = function () {
            // パラメータを取得
            const eParam = getQueryParam('e');  // "e" パラメータを取得
            const nParam = getQueryParam('n');  // "n" パラメータを取得

            loadCSVAndPopulateEvent();  // イベント情報を表示
            setNumber();  // 整理番号を設定
            setCurrentTime(); // ← 入場時間を設定
        };
    </script>

    <style>
        body,
        html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            font-family: 'NotoSansCJKjp', sans-serif;
            overflow: hidden;
            background-color: #e5e5e5;

        }

        /* 動画を表示するdiv */
        #videoContainer {
            width: 100%;
            position: fixed;
            top: 0;
            left: 0;
            z-index: 1;
        }

        /* 動画のスタイル */
        #videoContainer video {
            width: 100%;
            /* 横幅を画面サイズに合わせる */
            height: auto;
            /* アスペクト比を維持 */
        }

        /* 画像表示枠 */
        #imageContainer {
            width: 100%;
            /* 横幅を画面サイズに合わせる */
            display: flex;
            justify-content: center;
            align-items: center;
            padding-top: 60%;
            background-color: #e5e5e5;
            position: fixed;
            overflow: hidden;
        }

        #imageContainer img {
            max-width: 100%;
            /* 横幅に合わせる */
            height: auto;
            /* アスペクト比を維持 */
        }

        #event {
            top: 22.9%;
            left: 2.0%;
            font-size: 5.7vw;
            font-weight: 600;
            color: #e5e5e5;
        }

        #day {
            top: 72.0%;
            left: 8.7%;
            font-size: 3.7vw;
            font-weight: 400;
            color: #e5e5e5;
        }

        #opst {
            top: 82.9%;
            left: 8.7%;
            font-size: 3.7vw;
            font-weight: 400;
            color: #e5e5e5;
        }

        #type {
            top: 50.5%;
            left: 16.7%;
            font-size: 4.0vw;
            font-weight: 400;
        }

        #num {
            top: 57.8%;
            left: 16.7%;
            font-size: 5.7vw;
            font-weight: 600;
        }

        #name {
            top: 63.9%;
            left: 16.7%;
            font-size: 3.2vw;
            font-weight: 400;
        }

        #phone {
            top: 67.1%;
            left: 16.7%;
            font-size: 3.2vw;
            font-weight: 400;
        }

        #value {
            top: 70.2%;
            left: 16.5%;
            font-size: 3.2vw;
            font-weight: 400;
        }

        #entry {
            top: 73.2%;
            left: 16.5%;
            font-size: 3.2vw;
            font-weight: 400;
        }


        .overlay-text {
            position: absolute;
            /* 親要素（imageContainer）を基準に配置 */
            color: #000000e7;
            font-size: 20px;
            /* フォントサイズを調整 */
            pointer-events: none;
        }

        /* フッター画像 */
        #footer {
            position: fixed;
            background-color: #e5e5e5;
            width: 100%;
            padding: 0;
            bottom: -0.5%;
        }

        #footer img {
            max-width: 100%;
            /* 横幅に合わせる */
            height: auto;
            /* アスペクト比を維持 */
        }
    </style>
</head>

<body>
    <!-- 動画表示領域 -->
    <div id="videoContainer">
        <video autoplay muted loop playsinline>
            <source src="m.mp4" type="video/mp4">
            Your browser does not support the video tag.
        </video>
        <a id="event" class="overlay-text"></a>
        <a id="day" class="overlay-text"></a>
        <a id="opst" class="overlay-text">開場 <span id="open"></span> 開演 <span id="start"></span></a>

    </div>

    <!-- 画像表示枠 -->
    <div id="imageContainer">
        <a>
            <img src="tike3.jpg" alt="チケット画像">
        </a>
        <a id="type" class="overlay-text"></a>
        <a id="num" class="overlay-text seiban"><span id="ref"></span><span id="number"></span></a>
        <a id="name" class="overlay-text"><span id="tname"></span>様</a>
        <a id="phone" class="overlay-text">08045450721</a>
        <a id="value" class="overlay-text"><span id="price"></span>円</a>
        <a id="entry" class="overlay-text">入場時間：<span id="time"></span></a>
    </div>

    <!-- フッター -->
    <footer id="footer">
        <img src="footer.png" alt="フッター画像">
    </footer>
</body>

</html>
